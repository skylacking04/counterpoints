<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left green glow -->
  <ellipse cx="200" cy="315" rx="300" ry="250" fill="#22c55e" fill-opacity="0.06"/>
  <!-- Right red glow -->
  <ellipse cx="1000" cy="315" rx="300" ry="250" fill="#ef4444" fill-opacity="0.06"/>
  <!-- Purple center glow (X/Grok) -->
  <ellipse cx="600" cy="315" rx="200" ry="180" fill="#6366f1" fill-opacity="0.08"/>

  <!-- Big scales icon -->
  <!-- Pillar -->
  <rect x="588" y="120" width="24" height="220" rx="12" fill="#e2e8f0"/>
  <!-- Fulcrum -->
  <circle cx="600" cy="108" r="24" fill="#6366f1"/>
  <text x="600" y="116" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">⚖</text>
  <!-- Cross beam tilted -->
  <path d="M200 228 L1000 192" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round"/>
  <!-- Left chain -->
  <line x1="200" y1="228" x2="200" y2="290" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="1000" y1="192" x2="1000" y2="290" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <!-- Left pan (green) -->
  <rect x="90" y="290" width="220" height="16" rx="8" fill="#22c55e"/>
  <!-- Right pan (red) -->
  <rect x="890" y="290" width="220" height="16" rx="8" fill="#ef4444"/>

  <!-- Left verdict chips -->
  <rect x="110" y="330" width="180" height="32" rx="16" fill="#22c55e" fill-opacity="0.2"/>
  <text x="200" y="352" font-family="-apple-system,sans-serif" font-size="16" fill="#4ade80" text-anchor="middle" font-weight="600">✅ VERIFIED</text>

  <rect x="110" y="374" width="180" height="32" rx="16" fill="#eab308" fill-opacity="0.2"/>
  <text x="200" y="396" font-family="-apple-system,sans-serif" font-size="16" fill="#fbbf24" text-anchor="middle" font-weight="600">⚠ MISLEADING</text>

  <!-- Right verdict chips -->
  <rect x="910" y="330" width="180" height="32" rx="16" fill="#ef4444" fill-opacity="0.2"/>
  <text x="1000" y="352" font-family="-apple-system,sans-serif" font-size="16" fill="#f87171" text-anchor="middle" font-weight="600">❌ FALSE</text>

  <rect x="910" y="374" width="180" height="32" rx="16" fill="#6366f1" fill-opacity="0.2"/>
  <text x="1000" y="396" font-family="-apple-system,sans-serif" font-size="16" fill="#a5b4fc" text-anchor="middle" font-weight="600">? UNVERIFIED</text>

  <!-- Main title -->
  <text x="600" y="490" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="72" fill="white" text-anchor="middle" font-weight="800" letter-spacing="-2">CounterPoints</text>
  <!-- Tagline -->
  <text x="600" y="548" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle" font-weight="400">Real-Time Fact-Check Companion</text>

  <!-- Spectrum tab pills at bottom -->
  <rect x="320" y="580" width="100" height="28" rx="14" fill="#1e293b"/>
  <text x="370" y="599" font-family="sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">Left</text>
  <rect x="430" y="580" width="110" height="28" rx="14" fill="#1e293b"/>
  <text x="485" y="599" font-family="sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Center</text>
  <rect x="550" y="580" width="100" height="28" rx="14" fill="#1e293b"/>
  <text x="600" y="599" font-family="sans-serif" font-size="13" fill="#f87171" text-anchor="middle">Right</text>
  <rect x="660" y="580" width="90" height="28" rx="14" fill="#1e293b"/>
  <text x="705" y="599" font-family="sans-serif" font-size="13" fill="#c084fc" text-anchor="middle">Alt</text>
  <rect x="760" y="580" width="120" height="28" rx="14" fill="#1e3a5f"/>
  <text x="820" y="599" font-family="sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle">𝕏 / Grok</text>
</svg>
